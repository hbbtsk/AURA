      weiss_schnee: "一个很漂亮但看起来有点凶的女孩。"

narrative_text: "入学日的早晨，阳光透过银杏叶洒在信标学院的大门前。魏丝·雪倪站在台阶上，整理着行李，冰蓝色的眼睛扫视着来来往往的新生。突然，一个红色的身影从人群中冲出来——鲁比·罗丝，怀里抱着巨大的武器箱，一头撞上了魏丝的肩膀。武器箱摔在地上，发出沉闷的响声。魏丝皱起眉头，正要说些什么，却看见鲁比慌张地抬起头，那双银灰色的眼睛里满是歉意和——某种让她不安的纯粹。"

